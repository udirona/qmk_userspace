draw_config:
  key_w: 60.0
  key_h: 56.0
  split_gap: 30.0
  combo_w: 28.0
  combo_h: 26.0
  key_rx: 6.0
  key_ry: 6.0
  dark_mode: true
  n_columns: 1
  separate_combo_diagrams: false
  combo_diagrams_scale: 2
  inner_pad_w: 2.0
  inner_pad_h: 2.0
  outer_pad_w: 30.0
  outer_pad_h: 56.0
  line_spacing: 1.2
  arc_radius: 6.0
  append_colon_to_layer_header: true
  small_pad: 2.0
  legend_rel_x: 0.0
  legend_rel_y: 0.0
  draw_key_sides: false
  key_side_pars:
    rel_x: 0
    rel_y: 4
    rel_w: 12
    rel_h: 12
    rx: 4
    ry: 4
  svg_extra_style: ''
  footer_text: ''
  shrink_wide_legends: 7
  style_layer_activators: true
  glyph_tap_size: 14
  glyph_hold_size: 12
  glyph_shifted_size: 10
  glyphs: {}
parse_config:
  preprocess: false
  skip_binding_parsing: false
  raw_binding_map:
    S(KC_1): '!'
    S(KC_2): '@'
    S(KC_3): '#'
    S(KC_4): '$'
    S(KC_5): '%'
    S(KC_6): '^'
    S(KC_7): '&'
    S(KC_8): '*'
    S(KC_9): '('
    S(KC_0): ')'
    S(KC_SCLN): ':'
    S(KC_EQL): '+'
    S(KC_GRV): '~'
    S(KC_MINS): '_'
    S(KC_LBRC): '{'
    S(KC_RBRC): '}'
    S(KC_BSLS): '|'

    LT(LOWER,KC_SPC):
      tap: '␣'
      hold: Lower
    LT(3,KC_ENT):
      tap: $$mdi:keyboard-return$$
      hold: L3
    A(G(KC_UP)): 'AG(↑)'
    G(KC_LEFT): 'G(←)'
    G(KC_RGHT): 'G(→)'
    G(KC_UP): 'G(↑)'
    G(KC_DOWN): 'G(↓)'
    C(G(KC_LEFT)): 'CG(←)'
    C(G(KC_RGHT)): 'CG(→)'
    G(C(A(KC_1))): 'GCA(1)'
    G(C(A(KC_2))): 'GCA(2)'
    C(A(KC_DEL)): 'CA(Del)'
    MOUSEJIG: $$mdi:ghost-outline$$

    MT(MOD_LALT,KC_A):
      tab: 'A'
      hold: Alt
    MT(MOD_LGUI,KC_ESC):
      tap: Esc
      hold: $$mdi:penguin$$
    MT(MOD_LCTL | MOD_RCTL, KC_QUOT):
      tap: ''''
      hold: Ctrl
    MT(MOD_RCTL, KC_BSLS):
      tap: '\'
      hold: Ctrl

  sticky_label: sticky
  toggle_label: toggle
  tap_toggle_label: tap-toggle
  trans_legend:
    t: ▽
    type: trans
  mark_alternate_layer_activators: false
  modifier_fn_map:
    left_ctrl: Ctl
    right_ctrl: Ctl
    left_shift: Sft
    right_shift: Sft
    left_alt: Alt
    right_alt: AGr
    left_gui: Gui
    right_gui: Gui
    keycode_combiner: '{mods}+ {key}'
    mod_combiner: '{mod_1}+{mod_2}'
    special_combinations:
      left_ctrl+left_alt+left_gui+left_shift: Hyper
      left_ctrl+left_alt+left_shift: Meh
  qmk_remove_keycode_prefix:
  - KC_
  qmk_keycode_map:
    XXXXXXX: ''
    'NO': ''
    MINUS: '-'
    MINS: '-'
    EQUAL: '='
    EQL: '='
    LEFT_BRACKET: '['
